# Render blueprint for the Curate backend (Express + MongoDB Atlas + Anthropic).
# Deploy: Render dashboard → New → Blueprint → pick this repo.
# Set the `sync: false` secrets in the Render dashboard after the first deploy.
services:
  - type: web
    name: curate-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: ALLOWED_ORIGIN
        sync: false
