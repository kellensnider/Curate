# Render blueprint for the Curate backend (Express + MongoDB Atlas + Anthropic).
# Deploy: Render dashboard → New → Blueprint → pick this repo.
# Set the `sync: false` secrets in the Render dashboard after the first deploy.
services:
  - type: web
    name: curate-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: ALLOWED_ORIGIN
        sync: false
      # ── Computer-use agent (Gemini 2.5 Computer Use) ──
      # Render free-native can't run Chromium, so the agent drives a REMOTE
      # browser. RECOMMENDED: Browserbase (headless, residential proxy that beats
      # bot-detection like Disney, long sessions). Set sync:false secrets in dash.
      - key: AUTOMATION_ENABLED
        value: "true"
      #  Browserbase (preferred — takes priority if set):
      - key: BROWSERBASE_API_KEY
        sync: false # from browserbase.com dashboard
      - key: BROWSERBASE_PROJECT_ID
        sync: false # from browserbase.com dashboard
      # - key: BROWSERBASE_PROXIES   # residential proxy on by default; "false" to disable
      #   value: "false"
      #  OR Browserless (fallback; 60s session cap, headless via CDP not settable):
      # - key: BROWSER_WS_ENDPOINT
      #   sync: false
      # - key: BROWSER_CDP
      #   value: "true"
      # Auth — pick ONE:
      #  (A) Gemini API key (recommended; no service-account key needed):
      - key: GEMINI_API_KEY
        sync: false # from aistudio.google.com
      #  (B) Vertex via service-account key (blocked by some org policies):
      # - key: GCP_PROJECT_ID
      #   sync: false
      # - key: GOOGLE_CREDENTIALS_JSON
      #   sync: false
      - key: COMPUTER_USE_MODEL
        value: gemini-2.5-computer-use-preview-10-2025
