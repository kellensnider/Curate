# Render blueprint for the Curate backend (Express + MongoDB Atlas + Anthropic).
# Deploy: Render dashboard → New → Blueprint → pick this repo.
# Set the `sync: false` secrets in the Render dashboard after the first deploy.
services:
  - type: web
    name: curate-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: ALLOWED_ORIGIN
        sync: false
      # ── Computer-use agent (Gemini Computer Use on Vertex AI) ──
      # Render free-native can't run Chromium, so the agent drives a REMOTE
      # browser (Browserbase) and authenticates to Vertex with a service-account
      # key supplied as an env var. Set the sync:false secrets in the dashboard.
      - key: AUTOMATION_ENABLED
        value: "true"
      - key: GCP_PROJECT_ID
        sync: false # e.g. uoo-quackathon26eug-8216
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false # full service-account key JSON (Vertex AI User role)
      - key: BROWSER_WS_ENDPOINT
        sync: false # Browserbase CDP URL, e.g. wss://connect.browserbase.com?apiKey=...&projectId=...
      - key: COMPUTER_USE_MODEL
        value: gemini-2.5-computer-use-preview-10-2025
      - key: COMPUTER_USE_REGION
        value: global
